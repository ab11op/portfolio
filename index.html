<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Bhagat - Backend Engineer</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/sections.css">
    <link rel="stylesheet" href="styles/dark-mode.css">
    <link rel="stylesheet" href="styles/light-mode.css"> <!-- Light mode styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    



</head>
<body>
    <!-- Header Component -->
    <!-- <div id="logo-container"></div> -->
    <div class="theme-toggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon"></i>
    </div>
    <div id="header"></div>

    <!-- Main Content -->
    <main>
        <!-- About Section -->
        <div id="about"></div>

        <!-- Experience Section -->
        <div id="experience"></div>

        <!-- Projects Section -->
        <div id="projects"></div>

        <!-- Contact Section -->
        <div id="contact"></div>
    </main>

    <!-- Footer Component -->
    <div id="footer"></div>

    <!-- JavaScript Files -->
    <script src="scripts/script.js"></script>

    <!-- Load Components -->
    <script>
        // Load header
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header').innerHTML = data);

        // Load about section
        fetch('components/about.html')
            .then(response => response.text())
            .then(data => document.getElementById('about').innerHTML = data);

        // Load experience section
        fetch('components/experience.html')
            .then(response => response.text())
            .then(data => document.getElementById('experience').innerHTML = data);

        // Load projects section
        fetch('components/projects.html')
            .then(response => response.text())
            .then(data => document.getElementById('projects').innerHTML = data);

        // Load contact section
        fetch('components/contact.html')
            .then(response => response.text())
            .then(data => document.getElementById('contact').innerHTML = data);

        // Load footer
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
</body>
</html>
